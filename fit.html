<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Fitness">
    
    <title>Мой план тренировок</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary: #0a84ff;
            --text-main: #e0e0e0;
            --text-muted: #98989d;
            --border: #333336;
            --accent-green: #32d74b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 40px;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            background-color: var(--card-bg);
            padding: 15px 20px;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-subtitle {
            font-size: 12px;
            font-weight: 400;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* === TABS === */
        .tabs {
            display: flex;
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 57px;
            z-index: 9;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar { display: none; }

        .tab {
            flex: 1;
            min-width: 80px;
            padding: 12px 8px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 3px solid transparent;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .container { padding: 15px; }

        .notice {
            background-color: rgba(10, 132, 255, 0.15);
            color: #66b2ff;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 15px;
            line-height: 1.4;
            border: 1px solid rgba(10, 132, 255, 0.2);
        }

        .swipe-hint {
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 14px;
            opacity: 0.6;
        }

        /* ========================================
           SLOT — горизонтальный snap-скроллер
           ======================================== */
        .slot {
            margin-bottom: 18px;
        }

        .slot-scroll-wrapper {
            /* Нужен чтобы padding не ломал ширину */
            overflow: hidden;
            border-radius: 12px;
        }

        .slot-scroll {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .slot-scroll::-webkit-scrollbar { display: none; }

        .slot-card {
            flex: 0 0 100%;
            width: 100%;
            scroll-snap-align: center;
            scroll-snap-stop: always;
        }

        /* Dots */
        .slot-dots {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 10px;
        }
        .slot-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--border);
            transition: background 0.25s;
        }
        .slot-dot.active {
            background: var(--primary);
        }

        /* ========================================
           CARD
           ======================================== */
        .card {
            background: var(--card-bg);
            padding: 15px;
        }

        .card-number {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            color: var(--primary);
            background: rgba(10,132,255,0.15);
            padding: 2px 8px;
            border-radius: 20px;
            margin-bottom: 8px;
        }

        .card-header {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 6px;
            line-height: 1.3;
            color: #ffffff;
        }

        .card-sets-line {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        /* Spoiler */
        details {
            margin-bottom: 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            padding: 8px 12px;
            border: 1px solid var(--border);
        }
        summary {
            font-size: 14px;
            color: var(--primary);
            cursor: pointer;
            outline: none;
            font-weight: 500;
            list-style: none;
            display: flex;
            align-items: center;
        }
        summary::-webkit-details-marker { display: none; }
        summary::before {
            content: "▶";
            font-size: 10px;
            margin-right: 8px;
            transition: transform 0.2s;
        }
        details[open] summary::before {
            transform: rotate(90deg);
        }
        .technique-text {
            font-size: 13px;
            color: #b0b0b5;
            margin-top: 10px;
            line-height: 1.5;
            padding-top: 8px;
            border-top: 1px dashed var(--border);
        }
        .technique-text strong { color: #ffffff; }

        /* Bottom row */
        .card-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border);
            padding-top: 12px;
        }

        .sets-badge {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
            background: var(--bg-color);
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .weight-input-group {
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
        }
        .weight-input-group .wlabel {
            font-size: 14px;
            color: var(--text-muted);
        }

        input[type="number"] {
            width: 70px;
            padding: 8px;
            font-size: 16px;
            text-align: center;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-color);
            color: #ffffff;
            outline: none;
            transition: border-color 0.2s;
            -moz-appearance: textfield;
        }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none; margin: 0;
        }
        input[type="number"]:focus { border-color: var(--primary); }
        input[type="number"]::placeholder { color: #555555; }

        .save-indicator {
            font-size: 11px;
            color: var(--accent-green);
            opacity: 0;
            transition: opacity 0.3s;
            position: absolute;
            right: 0;
            top: -16px;
            white-space: nowrap;
            pointer-events: none;
        }
        .save-indicator.show { opacity: 1; }
    </style>
</head>

                                    "avoid": "Не отрывайте таз от скамьи."
                                },
                                {

                                    "sets": 4,
                                    "reps": "8–12",
                                    "how": "Сядьте, валик под голени. Согните ноги вниз.",
                                    "avoid": "Контролируйте опускание."
                                },
                                {
                                    "name": "Сгибания ног в кроссовере стоя (по одной)",
                                    "sets": 4,
                                    "reps": "8–12",
                                    "how": "Стоя лицом к кроссоверу, нижний блок на лодыжке. Согните ногу назад.",
                                    "avoid": "Не раскачивайтесь."
                                }
                            ]
                        },
                        {
                            "options": [
                                {
                                    "name": "Румынская тяга с гантелями (лёгкая)",
                                    "sets": 4,
                                    "reps": "8–12",
                                    "how": "Ноги на ширине плеч, гантели в руках. Наклоняйтесь вперёд, отводя таз назад, спина прямая.",
                                    "avoid": "Не округляйте спину, движение от бицепса бедра."
                                },
                                {
                                    "name": "Румынская тяга в Smith-машине (лёгкий вес)",
                                    "sets": 4,
                                    "reps": "8–12",
                                    "how": "В Smith-машине, штанга перед бёдрами. Опускайте штангу вниз по ногам.",
                                    "avoid": "Не сгибайте колени сильно."
                                },
                                {
                                    "name": "Тяга на прямых ногах в кроссовере (cable pull-through)",
                                    "sets": 4,
                                    "reps": "8–12",
                                    "how": "Низкий блок между ног, канат. Тяните таз назад, затем выпрямитесь.",
                                    "avoid": "Не округляйте спину."
                                }
                            ]
                        },
                        {
                            "options": [
                                {
                                    "name": "Жим Арнольда (гантели)",
                                    "sets": 4,
                                    "reps": "8–12",
                                    "how": "Сидя, гантели на уровне плеч ладонями к себе. Выжимайте вверх, разворачивая ладони вперёд.",
                                    "avoid": "Не прогибайтесь в пояснице."
                                },
                                {
                                    "name": "Жим гантелей сидя (классический)",
                                    "sets": 4,
                                    "reps": "8–12",
                                    "how": "Сидя, гантели над плечами. Выжмите вверх.",
                                    "avoid": "Не бейте гантели друг о друга."
                                },
                                {
                                    "name": "Жим в плечевом тренажёре",
                                    "sets": 4,
                                    "reps": "8–12",
                                    "how": "Сядьте в тренажёр, выжмите ручки вверх.",
                                    "avoid": "Полный диапазон."
                                }
                            ]
                        },
                        {
                            "options": [
                                {
                                    "name": "Подъёмы на носки стоя + суперсет с разгибаниями трицепса на блоке",
                                    "sets": 4,
                                    "reps": "8–12",
                                    "how": "Сначала подъёмы на носки в тренажёре, сразу после — разгибания трицепса на верхнем блоке. Без отдыха.",
                                    "avoid": "Не отдыхайте между упражнениями в суперсете."
                                },
                                {
                                    "name": "Подъёмы на носки сидя + разгибания трицепса",
                                    "sets": 4,
                                    "reps": "8–12",
                                    "how": "Сидя в тренажёре на икры + сразу разгибания трицепса.",
                                    "avoid": "Контролируйте каждое движение."
                                },
                                {
                                    "name": "Гантели на носки + отжимания от скамьи",
                                    "sets": 4,
                                    "reps": "8–12",
                                    "how": "Подъёмы на носки с гантелями + сразу отжимания от скамьи (трицепс).",
                                    "avoid": "Сохраняйте технику в суперсете."
                                }
                            ]
                        }
                    ]
                }
            ]
        };
        // =====================================================

        let currentDayIndex = 0;

        /* ---------- helpers ---------- */

        function weightKey(dayId, slotIdx, optIdx) {
            return `w_${dayId}_s${slotIdx}_o${optIdx}`;
        }

        function saveWeight(key, value) {
            localStorage.setItem(key, value);
            const el = document.getElementById('si_' + key);
            if (el) {
                el.classList.add('show');
                clearTimeout(el._tid);
                el._tid = setTimeout(() => el.classList.remove('show'), 1200);
            }
        }

        function savedScrollKey(dayId, slotIdx) {
            return `sc_${dayId}_s${slotIdx}`;
        }

        /* ---------- tabs ---------- */

        function buildTabs() {
            if (!plan || !plan.days) return;
            const wrap = document.getElementById('tabs');
            wrap.innerHTML = '';
            document.getElementById('headerTitle').textContent = plan.name || 'Тренировки';

            plan.days.forEach((day, i) => {
                const t = document.createElement('div');
                t.className = 'tab' + (i === 0 ? ' active' : '');
                t.textContent = 'День ' + day.id;
                t.addEventListener('click', () => switchDay(i));
                wrap.appendChild(t);
            });
        }

        function switchDay(idx) {
            currentDayIndex = idx;
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
            renderDay(idx);
        }

        /* ---------- render ---------- */

        function renderDay(idx) {
            const day = plan.days[idx];
            if (!day) return;

            const box = document.getElementById('content');
            document.getElementById('headerSubtitle').textContent = day.title || '';

            /* собираем HTML */
            let h = `<div class="notice"><b>Важно:</b> Выдох на усилии. Без задержки дыхания и натуживания.</div>`;

            const hasSwipe = day.slots.some(s => s.options && s.options.length > 1);
            if (hasSwipe) {
                h += `<div class="swipe-hint">← Смахните карточку, чтобы увидеть альтернативу →</div>`;
            }

            day.slots.forEach((slot, si) => {
                const opts = slot.options || [];
                if (opts.length === 0) return;

                h += `<div class="slot">`;

                if (opts.length === 1) {
                    /* одна карточка — без скроллера */
                    h += cardHTML(day.id, si, 0, opts[0], 1, 1);
                } else {
                    /* несколько альтернатив — snap-скроллер */
                    h += `<div class="slot-scroll-wrapper">`;
                    h += `<div class="slot-scroll" id="ss_${day.id}_${si}">`;
                    opts.forEach((opt, oi) => {
                        h += `<div class="slot-card">${cardHTML(day.id, si, oi, opt, oi + 1, opts.length)}</div>`;
                    });
                    h += `</div></div>`; // slot-scroll + wrapper

                    /* dots */
                    h += `<div class="slot-dots" id="dots_${day.id}_${si}">`;
                    opts.forEach((_, oi) => {
                        h += `<div class="slot-dot${oi === 0 ? ' active' : ''}"></div>`;
                    });
                    h += `</div>`;
                }

                h += `</div>`; // .slot
            });

            box.innerHTML = h;

            /* Привязка скролл-событий и восстановление позиции */
            day.slots.forEach((slot, si) => {
                if (!slot.options || slot.options.length <= 1) return;

                const scroller = document.getElementById(`ss_${day.id}_${si}`);
                if (!scroller) return;

                /* восстановить сохранённую позицию */
                const saved = parseInt(localStorage.getItem(savedScrollKey(day.id, si)) || '0', 10);
                if (saved > 0 && saved < slot.options.length) {
                    requestAnimationFrame(() => {
                        const target = scroller.children[saved];
                        if (target) scroller.scrollLeft = target.offsetLeft;
                        setDots(day.id, si, saved);
                    });
                }

                /* слушаем scroll */
                let tid;
                scroller.addEventListener('scroll', () => {
                    // === ДОБАВЛЕНО: закрываем все спойлеры в этом скроллере ===
                    scroller.querySelectorAll('details[open]').forEach(d => d.removeAttribute('open'));
                    // === КОНЕЦ ДОБАВЛЕНИЯ ===

                    clearTimeout(tid);
                    tid = setTimeout(() => {
                        const w = scroller.children[0]?.offsetWidth || 1;
                        const cur = Math.round(scroller.scrollLeft / w);
                        setDots(day.id, si, cur);
                        localStorage.setItem(savedScrollKey(day.id, si), cur);
                    }, 60);
                }, { passive: true });
            });
        }

        function cardHTML(dayId, si, oi, opt, num, total) {
            const wk = weightKey(dayId, si, oi);
            const sv = localStorage.getItem(wk) || '';
            const setsLabel = `${opt.sets} × ${opt.reps}`;
            const badge = total > 1 ? ` <span style="font-size:11px;color:var(--text-muted);font-weight:400;">(вариант ${num}/${total})</span>` : '';

            let tech = '';
            if (opt.how || opt.avoid) {
                tech = `<details>
                    <summary>Техника и ошибки</summary>
                    <div class="technique-text">
                        ${opt.how ? '<strong>Как делать:</strong> ' + opt.how : ''}
                        ${opt.how && opt.avoid ? '<br><br>' : ''}
                        ${opt.avoid ? '<strong>Избегать:</strong> ' + opt.avoid : ''}
                    </div>
                </details>`;
            }

            return `
                <div class="card">
                    <div class="card-number">Упр. ${si + 1}</div>
                    <div class="card-header">${opt.name}${badge}</div>
                    <div class="card-sets-line">${setsLabel}</div>
                    ${tech}
                    <div class="card-bottom">
                        <div class="sets-badge">${setsLabel}</div>
                        <div class="weight-input-group">
                            <span class="wlabel">Вес:</span>
                            <div style="position:relative;">
                                <input type="number" inputmode="decimal"
                                       value="${sv}" placeholder="кг"
                                       oninput="saveWeight('${wk}',this.value)">
                                <span class="save-indicator" id="si_${wk}">✓ ok</span>
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        function setDots(dayId, si, active) {
            const wrap = document.getElementById(`dots_${dayId}_${si}`);
            if (!wrap) return;
            [...wrap.children].forEach((d, i) => d.classList.toggle('active', i === active));
        }

        /* ---------- init ---------- */
        window.addEventListener('DOMContentLoaded', () => {
            if (!plan) {
                document.getElementById('content').innerHTML =
                    '<div class="notice" style="margin-top:20px;">⚠️ Вставьте JSON-объект в переменную <b>plan</b> внутри &lt;script&gt;.</div>';
                return;
            }
            buildTabs();
            renderDay(0);
        });
    </script>
</body>
