<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Камера + наложение</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: #fff;
      font-family: -apple-system, sans-serif;
      text-align: center;
    }
    #container {
      position: relative;
      display: inline-block;
      max-width: 100%;
    }
    canvas {
      max-width: 100%;
      display: block;
    }
    .controls {
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }
    button, label.btn {
      background: #007aff;
      color: #fff;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }
    input[type="range"] { width: 200px; }
    #fileInput { display: none; }
  </style>
</head>
<body>
  <div class="controls">
    <label class="btn" for="fileInput">📎 Прикрепить фото</label>
    <input type="file" id="fileInput" accept="image/*">
    <div>
      Прозрачность наложения: <span id="opacityVal">50</span>%<br>
      <input type="range" id="opacity" min="0" max="100" value="50">
    </div>
    <button id="saveBtn">💾 Сохранить фото</button>
  </div>

  <div id="container">
    <canvas id="canvas"></canvas>
  </div>

  <video id="video" autoplay playsinline muted style="display:none;"></video>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const opacitySlider = document.getElementById('opacity');
    const opacityVal = document.getElementById('opacityVal');
    const fileInput = document.getElementById('fileInput');
    const saveBtn = document.getElementById('saveBtn');

    let overlayImg = null;
    let opacity = 0.5;

    // Запуск фронтальной камеры в максимальном разрешении
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: 'user',           // фронтальная камера
            width: { ideal: 4096 },        // запрашиваем максимум
            height: { ideal: 4096 }
          },
          audio: false
        });
        video.srcObject = stream;

        await new Promise(resolve => {
          video.onloadedmetadata = () => {
            video.play();
            resolve();
          };
        });

        // Устанавливаем canvas под реальное разрешение видео
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        draw();
      } catch (err) {
        alert('Ошибка доступа к камере: ' + err.message);
      }
    }

    // Цикл отрисовки
    function draw() {
      ctx.save();
      // Зеркалим как селфи (по желанию — можно убрать)
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      ctx.restore();

      // Накладываем фото
      if (overlayImg) {
        ctx.globalAlpha = opacity;
        ctx.drawImage(overlayImg, 0, 0, canvas.width, canvas.height);
        ctx.globalAlpha = 1.0;
      }

      requestAnimationFrame(draw);
    }

    // Загрузка прикрепленного фото
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const img = new Image();
      img.onload = () => { overlayImg = img; };
      img.src = URL.createObjectURL(file);
    });

    // Прозрачность
    opacitySlider.addEventListener('input', (e) => {
      opacity = e.target.value / 100;
      opacityVal.textContent = e.target.value;
    });

    // Сохранение фото
    saveBtn.addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = 'photo_' + Date.now() + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });

    startCamera();
  </script>
</body>
</html>
