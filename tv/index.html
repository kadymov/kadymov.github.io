<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>TV Streams</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: Arial;
  background: #000;
  color: #fff;
  text-align: center;
}

.container {
  transition: opacity 0.3s;
}


select {
  padding: 10px;
  font-size: 16px;
  margin: 5px;
}
iframe {
  width: 100%;
  height: 500px;
  border: none;
  background: #000;
  overflow: hidden;
}

/* кнопка */
.night-btn {
  position: fixed;
  top: 10px;
  right: 15px;
  padding: 15px 17px;
  font-size: 16px;
  cursor: pointer;
}

.timer-btn {
  position: fixed;
  top: 10px;
  left: 15px;
  padding: 15px 17px;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>
<body>

<div class="container" id="container">
  <button class="night-btn" id="nightToggle">🌙</button>
  <button class="timer-btn" id="timerToggle">⏱</button>
  
  <select id="streamSelect">
    <option value="">📺 Выбери канал</option>
    <option value="https://live.vkvideo.ru/app/embed/grislytoe">Южный парк</option>
    <option value="https://goodgame.ru/player?199417">Футурама</option>
    <option value="https://live.vkvideo.ru/app/embed/play4fun">Гриффины</option>
    <option value="https://live.vkvideo.ru/app/embed/wfliq">Симпсоны (VK)</option>
    <option value="https://vkvideo.ru/video-183785346_456239246">Симпсоны (видео)</option>
    <option value="https://ok.ru/video/10377449447030">Марвел</option>
    <option value="https://ok.ru/video/10377449447030">Netflix</option>
    <option value="https://ok.ru/video/10922030997052">Гоблин</option>
    <option value="https://ok.ru/video/14019744177775">Ski-Fi</option>
    <option value="https://ok.ru/video/9998886575697">Видеокасета</option>
    <option value="https://live.vkvideo.ru/app/embed/timetomovie">О, Кино </option>
  </select>
  
  <div>
    <iframe id="player" scrolling="no"></iframe>
  </div>
</div>

<script>
const select = document.getElementById('streamSelect');
const player = document.getElementById('player');
const nightBtn = document.getElementById('nightToggle');
const container = document.getElementById('container');

let night = false;

// --- выбор стрима ---
function getEmbed(url) {
  if (url.includes("vkvideo.ru/video")) {
    const match = url.match(/video-?\d+_(\d+)/);
    if (match) {
      return "https://vk.com/video_ext.php?oid=-183785346&id=" + match[1];
    }
  }

  if (url.includes("ok.ru/video/")) {
    const id = url.split("/video/")[1];
    return "https://ok.ru/videoembed/" + id;
  }

  return url;
}

select.addEventListener('change', () => {
  const url = select.value;

  if (!url) {
    player.src = "";
    return;
  }

  player.style.display = "block"; // вернуть плеер
  player.src = getEmbed(url);
});

// --- ночной режим (opacity) ---
nightBtn.addEventListener('click', () => {
  night = !night;

  container.style.opacity = night ? "0.1" : "1";
  nightBtn.textContent = night ? "☀️" : "🌙";
});

// ------

const timerBtn = document.getElementById('timerToggle');

let timer = null;
let timerActive = false;

timerBtn.addEventListener('click', () => {

  // если таймер уже работает → выключаем
  if (timerActive) {
    clearTimeout(timer);
    timerActive = false;
    timerBtn.textContent = "⏱";
    return;
  }

  // включаем таймер на 30 минут
  timerActive = true;
  timerBtn.textContent = "❌";

  timer = setTimeout(() => {
    // выключаем плеер
    player.src = "";
    player.style.display = "none";

    timerActive = false;
    timerBtn.textContent = "⏱ 30 мин";

  }, 30 * 60 * 1000); // 30 минут
});
</script>

</body>
</html>
