<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>TV Streams</title>
<style>
body {
  font-family: Arial;
  background: #000;
  color: #fff;
  text-align: center;
}
select {
  padding: 10px;
  font-size: 16px;
  margin: 5px;
}
iframe {
  width: 100%;
  height: 500px;
  border: none;
  background: #000;
  transition: opacity 0.3s;
  overflow: hidden;
}

/* кнопка */
.night-btn {
  position: fixed;
  top: 15px;
  right: 15px;
  padding: 15px 17px;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>
<body>

<button class="night-btn" id="nightToggle">🌙</button>

<select id="streamSelect">
  <option value="">-- Выбери стрим --</option>
  <option value="https://live.vkvideo.ru/app/embed/grislytoe">Южный парк</option>
  <option value="https://goodgame.ru/player?199417">Футурама</option>
  <option value="https://live.vkvideo.ru/app/embed/play4fun">Гриффины</option>
  <option value="https://live.vkvideo.ru/app/embed/wfliq">Симпсоны (VK)</option>
  <option value="https://vkvideo.ru/video-183785346_456239246">Симпсоны (видео)</option>
  <option value="https://ok.ru/video/10377449447030">Марвел</option>
</select>

<div>
  <iframe id="player" scrolling="no"></iframe>
</div>

<script>
const select = document.getElementById('streamSelect');
const player = document.getElementById('player');
const nightBtn = document.getElementById('nightToggle');

let night = false;

// --- выбор стрима ---
function getEmbed(url) {
  if (url.includes("vkvideo.ru/video")) {
    const match = url.match(/video-?\d+_(\d+)/);
    if (match) {
      return "https://vk.com/video_ext.php?oid=-183785346&id=" + match[1];
    }
  }

  if (url.includes("ok.ru/video/")) {
    const id = url.split("/video/")[1];
    return "https://ok.ru/videoembed/" + id;
  }

  return url;
}

select.addEventListener('change', () => {
  const url = select.value;

  if (!url) {
    player.src = "";
    return;
  }

  player.src = getEmbed(url);
});

// --- ночной режим (opacity) ---
nightBtn.addEventListener('click', () => {
  night = !night;

  player.style.opacity = night ? "0.3" : "1";
  nightBtn.textContent = night ? "☀️" : "🌙";
});
</script>

</body>
</html>
